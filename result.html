<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crash Detection System</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; background: #f8f9fa; }
        h1 { color: #333; }
        form { margin-top: 30px; }
        input[type=file] { margin: 15px; }
        button { background: #007BFF; color: white; padding: 10px 20px; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>🚗 Crash Detection System</h1>
    <p>Upload a video to detect crash events</p>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="video" accept="video/*" required>
        <br>
        <button type="submit">Upload and Detect</button>
    </form>
</body>
</html>
